<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GREENSEER Logo - Reversed</title>
  <style>
    body { background-color: #0f172a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .greenseer-logo { display: flex; flex-direction: row-reverse; align-items: center; justify-content: center; gap: 16px; font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; user-select: none; }
    .logo-text { font-size: 32px; font-weight: 800; color: #f8fafc; letter-spacing: 0.15em; margin: 0; margin-top: 4px; }
    .text-accent { color: #22c55e; font-weight: 300; }
    .eye-icon { display: block; }
  </style>
</head>
<body>
  <div class="greenseer-logo">
    <svg class="eye-icon" width="60" height="60" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <path d="M 5,50 L 30,25 L 70,25 L 95,50 L 70,75 L 30,75 Z" fill="none" stroke="#22c55e" stroke-width="3" />
      <path d="M 12,50 L 32,32 L 68,32 L 88,50 L 68,68 L 32,68 Z" fill="#020617" />
      <path d="M 50,32 L 66,41 L 66,59 L 50,68 L 34,59 L 34,41 Z" fill="#16a34a" />
      <path d="M 50,32 L 66,41 L 50,50 Z" fill="#4ade80" opacity="0.5" />
      <path d="M 34,41 L 50,32 L 50,50 Z" fill="#064e3b" opacity="0.3" />
      <path d="M 50,40 L 56,50 L 50,60 L 44,50 Z" fill="#020617" />
      <path d="M 42,42 L 46,40 L 44,44 Z" fill="#ffffff" opacity="0.9" />
    </svg>
    <div class="logo-text">GREEN<span class="text-accent">SEER</span></div>
  </div>
</body>
</html>
